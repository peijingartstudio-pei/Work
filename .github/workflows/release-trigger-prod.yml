name: Deploy to Trigger.dev (prod)
on:
  push:
    branches:
      - main
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js 22.x
        uses: actions/setup-node@v5
        with:
          node-version: "22.x"
      - name: Install dependencies
        run: npm install
        working-directory: lobster-factory
      - name: Run lobster release gate
        env:
          LOBSTER_WORK_ROOT: ${{ github.workspace }}
          LOBSTER_SKIP_AGENCY_CANONICAL: "1"
        run: npm run validate
        working-directory: lobster-factory

  deploy:
    needs: gate
    runs-on: ubuntu-latest
    env:
      TRIGGER_PROJECT_REF: ${{ vars.TRIGGER_PROJECT_REF || 'proj_rqykzzwujizcxdzgnedn' }}
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js 22.x
        uses: actions/setup-node@v5
        with:
          node-version: "22.x"
      - name: Install dependencies
        run: npm install
        working-directory: lobster-factory/packages/workflows
      - name: Validate Trigger credentials
        env:
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
          TRIGGER_SECRET_KEY: ${{ secrets.TRIGGER_SECRET_KEY }}
        run: |
          if [ -z "${TRIGGER_ACCESS_TOKEN}" ]; then
            echo "Missing Trigger credentials. Set secrets.TRIGGER_ACCESS_TOKEN (PAT, prefix tr_pat_)."
            exit 1
          fi
      - name: Deploy Trigger.dev
        env:
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
        run: |
          for attempt in {1..3}; do
            echo "Deployment attempt $attempt of 3..."
            npx trigger.dev@4.4.3 deploy --env prod --project-ref "${TRIGGER_PROJECT_REF}" --log-level debug && break
            if [ $attempt -lt 3 ]; then
              echo "Failed, retrying in 10 seconds..."
              sleep 10
            else
              echo "Deployment failed after 3 attempts"
              exit 1
            fi
          done
        working-directory: lobster-factory/packages/workflows
