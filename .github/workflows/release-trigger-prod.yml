name: Deploy to Trigger.dev (prod)
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - name: Install dependencies
        run: npm install
        working-directory: lobster-factory
      - name: Run lobster release gate
        env:
          LOBSTER_WORK_ROOT: ${{ github.workspace }}
          LOBSTER_SKIP_AGENCY_CANONICAL: "1"
        run: npm run validate
        working-directory: lobster-factory

  deploy:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - name: Install dependencies
        run: npm install
        working-directory: lobster-factory/packages/workflows
      - name: Deploy Trigger.dev
        env:
                              TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
        run: npx trigger.dev@latest deploy
        working-directory: lobster-factory/packages/workflows
